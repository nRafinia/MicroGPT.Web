name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['MicroGpt/**', 'MicroGpt.Web/**', '.github/workflows/deploy-web.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # AOT makes in-browser training several times faster; drop this step and
      # the RunAOTCompilation flag for a faster CI build instead.
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish (AOT)
        run: dotnet publish MicroGpt.Web -c Release -p:RunAOTCompilation=true -o publish

      # Custom domain: keep base href "/" and ship the CNAME with the artifact.
      - name: Copy CNAME
        run: cp CNAME publish/wwwroot/CNAME

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
