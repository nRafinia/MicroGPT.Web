<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicroGPT — in-browser lab</title>
    <meta name="description" content="Train, sample, and anomaly-score a tiny GPT entirely inside your browser. A live demo of MicroGPT, a dependency-free GPT in pure C#." />
    <!-- For GitHub Pages under /MicroGPT/, change to: <base href="/MicroGPT/" /> -->
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>

<body>
    <div id="app">
        <div class="splash">
            <div class="brand-load">MicroGPT · in-browser lab</div>
            <p>Loading the .NET WebAssembly runtime…<br />
               After this download completes, everything runs locally in this tab.</p>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#b23a2a; color:#fff; padding:10px 16px; font-family:monospace;">
        An unhandled error occurred. <a href="." style="color:#fff">Reload</a>
        <span style="float:right; cursor:pointer" onclick="this.parentElement.style.display='none'">✕</span>
    </div>

    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
